version: "3.8"
services:
    frontend:
        build: ./frontend
        ports:
            - "8080:8080"
    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile.dev
        environment: 
            - MMFLOW_DB_PATH=/data/mmflow.db
            - CLIENT_ID
            - JAVA_TOOL_OPTIONS=-Dapp.mode=dev
        ports:
            - "8090:8090"
        volumes:
            - ${MMFLOW_DB_HOST_LOCATION}:/data
